server:
  port: ${SERVER_PORT:8080}

spring:
  config:
    import: optional:file:./config/application-local.yml
  application:
    name: programmer-escrow-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/programmer_escrow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:3000ms}
  security:
    user:
      name: disabled
      password: disabled
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:1074482770@qq.com}
    password: ${MAIL_PASSWORD:mcjsoqesxfstiiac}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          starttls:
            enable: true
            required: true
          ssl:
            enable: true

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.programmer.escrow
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

app:
  auth:
    token-expire-seconds: ${APP_AUTH_TOKEN_EXPIRE_SECONDS:7200}
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:5173}
      - ${FRONTEND_ORIGIN_ALT:http://127.0.0.1:5173}
      - ${FRONTEND_ORIGIN_PREVIEW:http://localhost:4173}
      - ${FRONTEND_ORIGIN_PREVIEW_ALT:http://127.0.0.1:4173}
  jwt:
    issuer: ${APP_JWT_ISSUER:programmer-escrow}
    secret: ${APP_JWT_SECRET:change-this-jwt-secret-to-a-very-long-random-string-2026}
    access-token-ttl-seconds: ${APP_JWT_ACCESS_TOKEN_TTL_SECONDS:7200}
    refresh-threshold-seconds: ${APP_JWT_REFRESH_THRESHOLD_SECONDS:1800}
  wechat:
    mock-enabled: ${WECHAT_MOCK_ENABLED:true}
    app-id: ${WECHAT_APP_ID:wx-demo-app-id}
    app-secret: ${WECHAT_APP_SECRET:wx-demo-app-secret}
    oauth-scope: ${WECHAT_OAUTH_SCOPE:snsapi_userinfo}
    callback-url: ${WECHAT_CALLBACK_URL:http://localhost:8080/wx/callback}
    qr-entry-url: ${WECHAT_QR_ENTRY_URL:http://localhost:8080/wx/login}
    login-entry-url: ${WECHAT_LOGIN_ENTRY_URL:http://localhost:8080/wx/login-entry}
    subscribe-url: ${WECHAT_SUBSCRIBE_URL:http://localhost:8080/wx/mock/follow}
    official-account-qr-image-url: ${WECHAT_OFFICIAL_QR_IMAGE_URL:https://dummyimage.com/320x320/16a34a/ffffff&text=Official+Account+QR}
    server-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
    official-access-token-key: ${WECHAT_OFFICIAL_ACCESS_TOKEN_KEY:WECHAT:ACCESS_TOKEN}
    mock:
      openid: ${WECHAT_MOCK_OPENID:mock-openid-10001}
      nickname: ${WECHAT_MOCK_NICKNAME:Mock WeChat User}
      avatar-url: ${WECHAT_MOCK_AVATAR_URL:https://dummyimage.com/200x200/2563eb/ffffff&text=WX}
      subscribed: ${WECHAT_MOCK_SUBSCRIBED:true}
  home:
    admin-contact:
      title: ${APP_HOME_ADMIN_CONTACT_TITLE:联系平台管理员}
      message: ${APP_HOME_ADMIN_CONTACT_MESSAGE:如需入驻答疑、活动合作、问题反馈或人工协助，可通过下方二维码联系平台管理员。}
      qr-image-url: ${APP_HOME_ADMIN_CONTACT_QR_IMAGE_URL:/qr-code.jpg}
    market-signals:
      - label: 高需求方向
        value: 企业后台 / 小程序 / AI 工具
        note: 近阶段更容易进入有效沟通的需求，优先来自已审核通过的真实发布内容。
      - label: 更易成交
        value: Demo / MVP / 二期接手
        note: 范围边界清晰、里程碑明确的需求，通常更容易快速进入报价与排期。
      - label: 沟通重点
        value: 交付范围 / 节点 / 预算
        note: 上线文案建议优先强调范围清晰和交付节奏，减少无效往返。
    trading-rules:
      - 先明确交付范围和里程碑，再进入报价，可以显著减少来回确认成本。
      - 优先验证关键流程是否跑通，再逐步补齐非核心页面和扩展能力。
      - 把预算、周期、协作方式说清楚，通常更容易在当天进入有效沟通。
  upload:
    base-dir: ${APP_UPLOAD_BASE_DIR:uploads}
  sequence:
    demand-prefix: ${APP_SEQUENCE_DEMAND_PREFIX:DM}
    quote-prefix: ${APP_SEQUENCE_QUOTE_PREFIX:QT}
    order-prefix: ${APP_SEQUENCE_ORDER_PREFIX:OD}
    dispute-prefix: ${APP_SEQUENCE_DISPUTE_PREFIX:DP}
  ai:
    enabled: ${APP_AI_ENABLED:false}
    fallback-enabled: ${APP_AI_FALLBACK_ENABLED:true}
    provider: ${APP_AI_PROVIDER:openai-compatible}
    base-url: ${APP_AI_BASE_URL:https://api.openai.com}
    chat-path: ${APP_AI_CHAT_PATH:/v1/chat/completions}
    api-key: ${APP_AI_API_KEY:}
    config-crypto-key: ${APP_AI_CONFIG_CRYPTO_KEY:change-this-ai-config-crypto-key-2026}
    model: ${APP_AI_MODEL:gpt-4.1-mini}
    temperature: ${APP_AI_TEMPERATURE:0.2}
    top-k: ${APP_AI_TOP_K:6}
    cache-ttl-seconds: ${APP_AI_CACHE_TTL_SECONDS:1800}
    connect-timeout-ms: ${APP_AI_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${APP_AI_READ_TIMEOUT_MS:20000}
