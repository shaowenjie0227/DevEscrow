server:
  port: 8080

spring:
  application:
    name: programmer-escrow-backend
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/programmer_escrow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 3000ms
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.programmer.escrow
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

app:
  auth:
    token-expire-seconds: 604800
  sequence:
    demand-prefix: DM
    quote-prefix: QT
    order-prefix: OD
    dispute-prefix: DP
